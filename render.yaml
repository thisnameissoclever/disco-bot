databases:
  - name: disco-stew-db
    plan: basic-256mb
    postgresMajorVersion: 16

services:
  - type: worker
    name: disco-stew
    runtime: docker
    plan: starter
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: disco-stew-db
          property: connectionString
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_DEV_GUILD_ID
        sync: false
      - key: OWNER_DISCORD_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SERVICENOW_VECTOR_STORE_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
